<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1020"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a2744" stroke-width="1"/>
    </pattern>
    <!-- Blue glow -->
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="5" height="470" rx="3" fill="#2563eb"/>

  <!-- SG monogram badge -->
  <rect x="104" y="80" width="80" height="80" rx="16" fill="#2563eb"/>
  <text x="144" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="#ffffff">SG</text>

  <!-- Name -->
  <text x="104" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#e5e7eb" letter-spacing="-2">Sonu Gupta</text>

  <!-- Title -->
  <text x="104" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#3b82f6">Senior Software Engineer</text>

  <!-- Divider -->
  <rect x="104" y="348" width="340" height="2" rx="1" fill="#1d2a49"/>

  <!-- Specialties -->
  <text x="104" y="394" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">Full Stack  ·  AI Integrations  ·  Product Engineering</text>

  <!-- Tags -->
  <rect x="104" y="430" width="140" height="40" rx="20" fill="#1d2a49"/>
  <text x="174" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#3b82f6">TypeScript</text>

  <rect x="256" y="430" width="100" height="40" rx="20" fill="#1d2a49"/>
  <text x="306" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#3b82f6">Node.js</text>

  <rect x="368" y="430" width="100" height="40" rx="20" fill="#1d2a49"/>
  <text x="418" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#3b82f6">React</text>

  <rect x="480" y="430" width="80" height="40" rx="20" fill="#1d2a49"/>
  <text x="520" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#3b82f6">AWS</text>

  <rect x="572" y="430" width="60" height="40" rx="20" fill="#1d2a49"/>
  <text x="602" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#3b82f6">AI</text>

  <!-- Domain pill bottom right -->
  <text x="1120" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="22" text-anchor="end" fill="#475569">sonugupta.dev</text>
</svg>
