[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Redirect all routes to index for any future dynamic features
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}
  force = false

# Pretty URLs — trailing slash handling
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
